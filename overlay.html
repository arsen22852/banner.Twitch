<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Overlay</title>
<style>
body {
    margin: 0;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
}

.container {
    width: 320px;
    height: 320px;
    perspective: 1200px;
}

.card {
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at top, #0a0a0a, #000);
    border-radius: 25px;
    padding: 10px;
    box-sizing: border-box;

    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;

    /* Цикл 5 секунд, с быстрым сальто внутри */
    animation: flip 5s infinite ease-in-out;

    box-shadow:
        0 0 20px rgba(255,0,0,0.5),
        0 0 50px rgba(255,0,0,0.3),
        inset 0 0 25px rgba(255,0,0,0.2);
}

@keyframes flip {
    0%   { transform: rotateX(0deg); }
    30%  { transform: rotateX(180deg); } /* быстрый поворот */
    50%  { transform: rotateX(180deg); } /* пауза */
    80%  { transform: rotateX(360deg); }
    100% { transform: rotateX(360deg); }
}

.logo {
    width: 100%;
    height: 210px; /* большая картинка */
    background: url("logo.png") no-repeat center;
    background-size: contain;
    filter: drop-shadow(0 0 15px red);
}

.text {
    margin-top: auto;
    margin-bottom: 10px;
    text-align: center;
    color: #ff3b3b;
    font-size: 15px;
    text-shadow:
        0 0 8px #ff0000,
        0 0 20px #ff0000,
        0 0 40px #ff0000;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 5px red; }
    to   { text-shadow: 0 0 25px red; }
}

.promo {
    margin-top: 6px;
    padding: 6px 12px;
    background: linear-gradient(135deg, #ff0000, #990000);
    border-radius: 8px;
    font-weight: bold;
    color: #fff;
    box-shadow: 0 0 15px red;
}

.bottom {
    font-size: 13px;
    opacity: 0.9;
}
</style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="logo"></div>

        <div class="text">
            <div>хочешь бакс на халяву?</div>
            <div>тогда вводи</div>
            <div class="promo">PROMO YUTUT1K</div>
            <div class="bottom">инструкция в описании!</div>
        </div>
    </div>
</div>

</body>
</html>
